name: Build and Publish Radio Automation

on:
  # trigger manual
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '**/.gitignore'
      - '**/README.md'
      - '.github/**'
      - 'CHANGELOG.md'
      - '.editorconfig'
      - 'qodana.yml'
      - 'CLAUDE.md'

env:
  HUSKY: 0

jobs:
  build-and-publish:
    runs-on: windows-latest
    permissions:
      packages: write
      contents: write
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Display dotnet version
        run: dotnet --version

      - name: Restore dependencies
        run: dotnet restore --runtime win-x64

      - name: Setup git
        run: |
          git config --local user.email "git@k9kld.org"
          git config --local user.name "git"

      - name: Install Versionize
        run: dotnet tool install --global Versionize

      - name: Versioning
        id: versionize
        run: versionize --aggregate-pre-releases --skip-dirty
        continue-on-error: true

      - name: Test if release required
        if: steps.versionize.outcome != 'success'
        run: echo "Skipping Release. No release required."
        
      - name: Push changes to GitHub
        if: steps.versionize.outcome == 'success'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true
           
      - name: Get current version
        if: steps.versionize.outcome == 'success'
        run: |
            APPVERSION=$(versionize inspect)
            echo "VERSION is: $APPVERSION"
            echo "VERSION=$APPVERSION" >> $GITHUB_ENV
            echo "VERSION=$APPVERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Get current changelog
        if: steps.versionize.outcome == 'success'
        run: |
          echo "$(versionize changelog)" > latest_changelog.md
          cat latest_changelog.md
        shell: bash
            
      - name: Publish
        if: steps.versionize.outcome == 'success'
        run: dotnet publish '.\Radio Automation\Radio Automation.csproj' -p:PublishProfile=BuildProfile.pubxml /p:EnableWindowsTargeting=true
        
      - name: Installer
        if: steps.versionize.outcome == 'success'
        run: dotnet build -c Release /p:Version=${{env.VERSION}}

      - name: Upload artifact
        id: artifact-upload-step
        if: steps.versionize.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: "Radio Automation"
          path:  "./Release/en-US/*.msi"
          
      - name: Download Artifact
        if: steps.versionize.outcome == 'success'
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ steps.artifact-upload-step.outputs.artifact-id }}
          path: downloaded-artifact

      - name: Create Release
        if: steps.versionize.outcome == 'success'
        uses: softprops/action-gh-release@v3
        with:
          files: downloaded-artifact/*.* # Path to the downloaded artifact
          body_path: latest_changelog.md
          name: "Release ${{env.VERSION}}"
          tag_name: "v${{env.VERSION}}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Publish to Winget
        if: steps.versionize.outcome == 'success'
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: JTDev.RadioAutomation
          installers-regex: '\.msi$' # Only .msi files
          token: ${{ secrets.WINGET_TOKEN }}
          version: ${{env.VERSION}}
          release-tag: v${{env.VERSION}}
